<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reporte de Pago - WIFI_PIN_ACCESS</title>
    <style>
        :root {
            --color-main: #1877F2;
            --color-success: #22c55e;
            --color-error: #dc3545;
            --text-dark: #1f2937;
            --shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 22px;
            width: 92%;
            max-width: 380px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        /* DISEÑO DATOS PAGO */
        .payment-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .cashea-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cashea-row:last-child { border-bottom: none; }

        .label-cashea { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .value-cashea { font-size: 14px; font-weight: 700; color: #1e293b; }

        .btn-copy-mini {
            background: #e2e8f0;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            color: var(--color-main);
            cursor: pointer;
        }

        /* FORMULARIO */
        label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-left: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--color-main); }

        .campo-referencia {
            background: #f0faff;
            border-color: var(--color-main);
            font-weight: bold;
            color: var(--color-main);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: var(--color-main);
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        #estado {
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Reportar Pago</h2>

    <div class="payment-card">
        <div style="font-size:10px; font-weight:800; color:var(--color-main); margin-bottom:6px; text-align:center; letter-spacing:1px;">DATOS DE PAGO MÓVIL</div>
        
        <div class="cashea-row">
            <div>
                <div class="label-cashea">Banco</div>
                <div class="value-cashea">BVC (0104)</div>
            </div>
            <button class="btn-copy-mini" onclick="copyText('0104', this)">COPIAR</button>
        </div>

        <div class="cashea-row">
            <div>
                <div class="label-cashea">Cédula</div>
                <div class="value-cashea">V-14.560.040</div>
            </div>
            <button class="btn-copy-mini" onclick="copyText('14560040', this)">COPIAR</button>
        </div>

        <div class="cashea-row">
            <div>
                <div class="label-cashea">Teléfono</div>
                <div class="value-cashea">0424-8808670</div>
            </div>
            <button class="btn-copy-mini" onclick="copyText('04248808670', this)">COPIAR</button>
        </div>
    </div>

    <form id="pagoForm">
        <label>Nombre del Cliente</label>
        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" required>

        <label>Teléfono de Contacto</label>
        <input type="tel" id="telefono" placeholder="Ej: 04121234567" required>
        
        <label>Método de Pago</label>
        <select id="metodo">
            <option value="Pago Movil">Pago Móvil</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Zelle / Divisas">Zelle / Divisas</option>
        </select>
        
        <label>Monto de la Operación</label>
        <input type="text" id="monto" placeholder="Ej: 1.250,00" inputmode="decimal" required>
        
        <label>Número de Referencia</label>
        <input type="text" id="referencia" class="campo-referencia" placeholder="Los últimos 6 dígitos" required>
        
        <button type="submit">ENVIAR REPORTE</button>
    </form>
    
    <p id="estado"></p>
</div>

<script>
    const token = "8276591733:AAHUmQLPnCUpxvAex91KrhDRAxI62lzQ4sQ"; 
    const chatId = "2052943784"; 

    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = "¡OK!";
            btn.style.background = "#22c55e";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.background = "#e2e8f0";
                btn.style.color = "#1877F2";
            }, 1200);
        });
    }

    document.getElementById('pagoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const estado = document.getElementById('estado');
        estado.style.color = "#1877F2";
        estado.innerText = "Enviando reporte...";

        // Obtener Fecha y Hora actual
        const ahora = new Date();
        const fecha = ahora.toLocaleDateString('es-VE'); 
        const hora = ahora.toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit', hour12: true });

        const datos = {
            cliente: document.getElementById('cliente').value,
            tlf: document.getElementById('telefono').value,
            metodo: document.getElementById('metodo').value,
            monto: document.getElementById('monto').value,
            ref: document.getElementById('referencia').value
        };

        const telefonoLimpio = datos.tlf.replace(/\D/g, '');
        const telefonoWhatsApp = telefonoLimpio.startsWith('0') ? `58${telefonoLimpio.slice(1)}` : telefonoLimpio;
        const linkWhatsApp = `https://wa.me/${telefonoWhatsApp}`;

        function escapeHTML(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Construcción del mensaje con formato para Telegram usando HTML
        const textoMensaje = `🏦 <b>NUEVO REPORTE DE PAGO</b>\n\n📅 <b>Fecha:</b> ${escapeHTML(fecha)}\n⏰ <b>Hora:</b> ${escapeHTML(hora)}\n------------------------------\n👤 <b>Cliente:</b> ${escapeHTML(datos.cliente)}\n📞 <b>Tlf:</b> <a href="${linkWhatsApp}">${escapeHTML(datos.tlf)}</a>\n💳 <b>Método:</b> ${escapeHTML(datos.metodo)}\n💰 <b>Monto:</b> ${escapeHTML(datos.monto)}\n🔢 <b>Ref:</b> ${escapeHTML(datos.ref)}`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(textoMensaje)}&parse_mode=HTML`;

        fetch(url)
        .then(response => {
            if(response.ok) {
                estado.style.color = "#22c55e";
                estado.innerText = "✅ Reporte enviado con éxito.";
                document.getElementById('pagoForm').reset();
            } else {
                estado.style.color = "#dc3545";
                estado.innerText = "❌ Error al enviar reporte.";
            }
        })
        .catch(error => {
            estado.style.color = "#dc3545";
            estado.innerText = "❌ Error de conexión.";
        });
    });
</script>

</body>
</html>
