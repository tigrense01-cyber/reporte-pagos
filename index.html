<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reporte de Pago - Mi WISP</title>
    <style>
        :root {
            --color-main: #1877F2;
            --color-success: #22c55e;
            --color-error: #dc3545;
            --text-dark: #1f2937;
            --shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 22px;
            width: 92%;
            max-width: 380px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        /* TEXTO DINÁMICO TASA BCV */
        .tasa-container {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 18px;
        }

        #valorTasa {
            color: var(--color-success);
            font-weight: 800;
        }

        /* DISEÑO DATOS PAGO */
        .payment-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .cashea-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cashea-row:last-child { border-bottom: none; }

        .label-cashea { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .value-cashea { font-size: 14px; font-weight: 700; color: #1e293b; }

        .btn-copy-mini {
            background: #e2e8f0;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            color: var(--color-main);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        /* FORMULARIO */
        label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-left: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--color-main); }

        .campo-referencia {
            background: #f0faff;
            border-color: var(--color-main);
            font-weight: bold;
            color: var(--color-main);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: var(--color-main);
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        #estado {
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
