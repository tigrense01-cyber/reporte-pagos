<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reporte de Pago - Pin_Access</title>
    <style>
        :root {
            --color-main: #1877F2;
            --color-success: #22c55e;
            --color-error: #dc3545;
            --text-dark: #1f2937;
            --shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 22px;
            width: 92%;
            max-width: 380px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        /* TEXTO DINÁMICO TASA BCV */
        .tasa-container {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 18px;
        }

        #valorTasa {
            color: var(--color-success);
            font-weight: 800;
        }

        /* DISEÑO DATOS PAGO */
        .payment-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .cashea-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cashea-row:last-child { border-bottom: none; }

        .label-cashea { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .value-cashea { font-size: 14px; font-weight: 700; color: #1e293b; }

        .btn-copy-mini {
            background: #e2e8f0;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            color: var(--color-main);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        /* FORMULARIO */
        label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-left: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--color-main); }

        .campo-referencia {
            background: #f0faff;
            border-color: var(--color-main);
            font-weight: bold;
            color: var(--color-main);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: var(--color-main);
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        #estado {
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Reportar Pago</h2>
    <div class="tasa-container">Tasa Oficial BCV: <span id="valorTasa">Cargando...</span></div>

    <div class="payment-card">
        <div style="font-size:12px; font-weight:800; color:var(--color-main); margin-bottom:6px; text-align:center; letter-spacing:1px;">DATOS DE PAGO MÓVIL</div>
        
        <div class="cashea-row">
            <div>
                <div class="label-cashea">Banco</div>
                <div class="value-cashea">BVC (0104)</div>
            </div>
            <button class="btn-copy-mini" onClick="copySingle('0104', this)">COPIAR</button>
        </div>

        <div class="cashea-row">
            <div>
                <div class="label-cashea">Cédula</div>
                <div class="value-cashea">V-14.560.040</div>
            </div>
            <button class="btn-copy-mini" onClick="copySingle('14560040', this)">COPIAR</button>
        </div>

        <div class="cashea-row">
            <div>
                <div class="label-cashea">Teléfono</div>
                <div class="value-cashea">0424-8808670</div>
            </div>
            <button class="btn-copy-mini" onClick="copySingle('04248808670', this)">COPIAR</button>
        </div>

        <div style="display:flex; justify-content:flex-start; margin:6px 0 0 0;">
            <button class="btn-copy-mini" onClick="copyAllMobile(this)">COPIAR TODO</button>
        </div>

    </div>

    <form id="pagoForm" autocomplete="off">
        <label>Nombre del Cliente</label>
        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" autocomplete="one-time-code" required>

        <label>Teléfono de Contacto</label>
        <input type="tel" id="telefono" placeholder="Ej: 04121234567" autocomplete="one-time-code" required>
        
        <label>Método de Pago</label>
        <select id="metodo">
            <option value="Pago Movil">Pago Móvil</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Zelle / Divisas">Zelle / Divisas</option>
        </select>
        
        <label>Monto de la Operación</label>
        <input type="text" id="monto" placeholder="Ej: 1.250,00" inputmode="decimal" autocomplete="off" required>
        
        <label>Número de Referencia</label>
        <input type="text" id="referencia" class="campo-referencia" placeholder="Los últimos 6 dígitos" autocomplete="off" required>
        
        <button type="submit">ENVIAR REPORTE</button>
    </form>
    
    <p id="estado"></p>
</div>

<script>
    // --- Configuración de Telegram ---
    const token = "8276591733:AAHUmQLPnCUpxvAex91KrhDRAxI62lzQ4sQ"; 
    const chatId = "2052943784"; 

    // --- CONFIGURACIÓN DE GITHUB ---
    const GITHUB_TOKEN = "Admin.2026**"; // REEMPLAZA ESTO
    const REPO_OWNER = "tigrense01-cyber";               // REEMPLAZA ESTO
    const REPO_NAME = "reporte-pagos";           // REEMPLAZA ESTO
    const FILE_PATH = "reporte_pagos.txt";                   // El archivo donde se acumulan los pagos

    window.addEventListener('DOMContentLoaded', () => {
        fetch('https://ve.dolarapi.com/v1/dolares/oficial')
            .then(response => {
                if (!response.ok) throw new Error('Error en la respuesta de la API');
                return response.json();
            })
            .then(data => {
                if(data && data.promedio) {
                    const tasaFormateada = new Intl.NumberFormat('es-VE', { 
                        minimumFractionDigits: 2, 
                        maximumFractionDigits: 2 
                    }).format(data.promedio);
                    
                    document.getElementById('valorTasa').innerText = `${tasaFormateada} VES`;
                } else {
                    document.getElementById('valorTasa').innerText = "No disponible";
                }
            })
            .catch(error => {
                console.error("Error cargando API BCV:", error);
                document.getElementById('valorTasa').innerText = "Error al cargar";
            });
    });

    function copySingle(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = "¡OK!";
            btn.style.background = "#22c55e";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.background = "#e2e8f0";
                btn.style.color = "#1877F2";
            }, 1200);
        });
    }

    function copyAllMobile(button) {
        const textToCopy = "0104 04248808670 14560040";
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = button.innerText;
            button.innerText = "¡TODO COPIADO!";
            button.style.background = "#22c55e";
            button.style.color = "white";
            
            setTimeout(() => { 
                button.innerText = originalText; 
                button.style.background = "#e2e8f0"; 
                button.style.color = "#1877F2";
            }, 1200);
        }).catch(err => console.error('Error:', err));
    }

    // Proceso unificado al enviar el formulario
    document.getElementById('pagoForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const estado = document.getElementById('estado');
        estado.style.color = "#1877F2";
        estado.innerText = "Enviando reporte...";

        // Captura de Tiempo Local
        const ahora = new Date();
        const fecha = ahora.toLocaleDateString('es-VE'); 
        const hora = ahora.toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit', hour12: true });

        // Recolección de Datos
        const datos = {
            cliente: document.getElementById('cliente').value,
            tlf: document.getElementById('telefono').value,
            metodo: document.getElementById('metodo').value,
            monto: document.getElementById('monto').value,
            ref: document.getElementById('referencia').value
        };

        // Preparación enlaces de WhatsApp para Telegram
        const telefonoLimpio = datos.tlf.replace(/\D/g, '');
        const telefonoWhatsApp = telefonoLimpio.startsWith('0') ? `58${telefonoLimpio.slice(1)}` : telefonoLimpio;
        const linkWhatsApp = `https://wa.me/${telefonoWhatsApp}`;

        function escapeHTML(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 1. GENERAR TEXTO PARA TELEGRAM (HTML)
        const textoTelegram = `🏦 <b>NUEVO REPORTE DE PAGO</b>\n\n📅 <b>Fecha:</b> ${escapeHTML(fecha)}\n⏰ <b>Hora:</b> ${escapeHTML(hora)}\n------------------------------\n👤 <b>Cliente:</b> ${escapeHTML(datos.cliente)}\n📞 <b>Tlf:</b> <a href="${linkWhatsApp}">${escapeHTML(datos.tlf)}</a>\n💳 <b>Método:</b> ${escapeHTML(datos.metodo)}\n💰 <b>Monto:</b> ${escapeHTML(datos.monto)}\n🔢 <b>Ref:</b> ${escapeHTML(datos.ref)}`;

        // 2. GENERAR TEXTO PLANO LIMPIO PARA GITHUB (Tu plantilla exacta)
        const textoGitHub = `🏦 NUEVO REPORTE DE PAGO\n\n` +
                            `📅 Fecha: ${fecha}\n` +
                            `⏰ Hora: ${hora}\n` +
                            `------------------------------\n` +
                            `👤 Cliente: ${datos.cliente}\n` +
                            `📞 Tlf: ${datos.tlf}\n` +
                            `💳 Método: ${datos.metodo}\n` +
                            `💰 Monto: ${datos.monto}\n` +
                            `🔢 Ref: ${datos.ref}\n\n`;

        try {
            // --- ENVÍO A TELEGRAM ---
            const urlTelegram = `https://api.telegram.org/bot${token}/sendMessage`;
            const envioTelegram = fetch(urlTelegram, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: textoTelegram,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            });

            // --- ENVÍO A GITHUB API ---
            const urlGitHub = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            let sha = "";
            let contenidoActual = "";

            // Buscamos si el archivo de reportes ya existe en GitHub para traer su contenido actual
            const resGet = await fetch(urlGitHub, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });

            if (resGet.status === 200) {
                const dataGet = await resGet.json();
                sha = dataGet.sha;
                // Decodificamos de Base64 de forma segura para UTF-8 (mantiene los emojis intactos)
                contenidoActual = decodeURIComponent(atob(dataGet.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            }

            // Añadimos el nuevo pago al historial existente
            const contenidoFinal = contenidoActual + textoGitHub;
            const contenidoBase64 = btoa(unescape(encodeURIComponent(contenidoFinal)));

            const envioGitHub = fetch(urlGitHub, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `📌 Registro Pago de ${datos.cliente} - Ref: ${datos.ref}`,
                    content: contenidoBase64,
                    sha: sha
                })
            });

            // Esperamos que ambas promesas finalicen
            const [resTelegram, resGitHub] = await Promise.all([envioTelegram, envioGitHub]);

            if(resTelegram.ok && (resGitHub.status === 200 || resGitHub.status === 201)) {
                estado.style.color = "#22c55e";
                estado.innerText = "✅ Reporte enviado a Telegram y guardado en GitHub.";
                document.getElementById('pagoForm').reset();
            } else {
                throw new Error("Error en alguna de las plataformas");
            }

        } catch (error) {
            console.error(error);
            estado.style.color = "#dc3545";
            estado.innerText = "❌ Error al procesar o guardar el reporte.";
        }
    });
</script>

</body>
</html>
