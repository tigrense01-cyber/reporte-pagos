<script>
    // --- CONFIGURACIÓN ---
    const token = "6554753247:AAFUFA8uZgEhDXOlHCwz4Hcr2ORI-qgVBOY"; 
    const chatId = "2052943784"; 
    // ASEGÚRATE DE QUE ESTA SEA LA URL DE TU ÚLTIMA IMPLEMENTACIÓN
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyIzlptby-VoHrrxQ9J49KIq790-GqpDJRXyubHwxboFh6qJFiIzi_c3IaueoA7BzmH/exec';

    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = "¡OK!";
            btn.style.background = "#22c55e";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.background = "#e2e8f0";
                btn.style.color = "#1877F2";
            }, 1200);
        });
    }

    const form = document.getElementById('pagoForm');
    const btnSubmit = document.getElementById('submit-btn');
    const estado = document.getElementById('estado');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        estado.style.color = "#1877F2";
        estado.innerText = "Enviando reporte...";
        btnSubmit.disabled = true;

        const formData = new FormData(form);
        const cliente = document.getElementById('cliente').value;
        const tlf = document.getElementById('telefono').value;
        const metodo = document.getElementById('metodo').value;
        const monto = document.getElementById('monto').value;
        const ref = document.getElementById('referencia').value;

        // 1. Envío a Telegram
        const mensajeTelegram = `🏦 *NUEVO REPORTE DE PAGO*%0A%0A👤 *Cliente:* ${cliente}%0A📞 *Tlf:* ${tlf}%0A💳 *Método:* ${metodo}%0A💰 *Monto:* ${monto}%0A🔢 *Ref:* ${ref}`;
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${mensajeTelegram}&parse_mode=Markdown`)
        .then(resTelegram => {
            // Intentar enviar a Google Sheets independientemente de Telegram
            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors'})
            .then(() => {
                // Usamos 'no-cors' para evitar el error de bloqueo del navegador
                estado.style.color = "#22c55e";
                estado.innerText = "✅ Reporte enviado con éxito.";
                form.reset();
            })
            .catch(errSheets => {
                console.error('Error Sheets:', errSheets);
                estado.innerText = "✅ Enviado a Telegram (Error en Excel)";
            });
        })
        .catch(error => {
            estado.style.color = "#dc3545";
            estado.innerText = "❌ Error de conexión.";
            console.error('Error!', error);
        })
        .finally(() => {
            btnSubmit.disabled = false;
        });
    });
</script>
