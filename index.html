<script>
    // --- CONFIGURACIÓN ---
    const CONFIG = {
        telegramToken: "6554753247:AAFUFA8uZgEhDXOlHCwz4Hcr2ORI-qgVBOY",
        chatId: "2052943784",
        scriptURL: 'https://script.google.com/macros/s/AKfycbwmL2cspMneufDpVio6BHH5YjOkph4VwsYDLKQqTmR-3rlH7p8x9T-vjWrzG_w8heXA/exec'
    };

    // Función auxiliar para copiar al portapapeles
    function copyText(text, btn) {
        if (!navigator.clipboard) return;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "¡Copiado!";
            btn.style.backgroundColor = "#22c55e";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "";
                btn.style.color = "";
            }, 1500);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const pagoForm = document.getElementById('pagoForm');
        const btnSubmit = document.getElementById('submit-btn');
        const estadoMsg = document.getElementById('estado');

        if (!pagoForm) return;

        pagoForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Bloquear UI
            btnSubmit.disabled = true;
            estadoMsg.style.color = "#1877F2";
            estadoMsg.innerText = "Procesando reporte...";

            const formData = new FormData(pagoForm);
            const data = Object.fromEntries(formData.entries());

            // 1. Formatear mensaje para Telegram
            const textoTelegram = [
                "🏦 *NUEVO REPORTE DE PAGO*",
                "",
                `👤 *Cliente:* ${data.cliente}`,
                `📞 *Teléfono:* ${data.telefono}`,
                `💳 *Método:* ${data.metodo}`,
                `💰 *Monto:* ${data.monto}`,
                `🔢 *Referencia:* ${data.referencia}`
            ].join("%0A");

            try {
                // 2. Envío prioritario a Telegram
                const telegramRes = await fetch(
                    `https://api.telegram.org/bot${CONFIG.telegramToken}/sendMessage?chat_id=${CONFIG.chatId}&text=${textoTelegram}&parse_mode=Markdown`
                );

                if (!telegramRes.ok) throw new Error('Fallo Telegram');

                // 3. Envío a Google Sheets (en segundo plano)
                // Usamos 'no-cors' para evitar errores de políticas de origen
                fetch(CONFIG.scriptURL, { 
                    method: 'POST', 
                    body: formData, 
                    mode: 'no-cors' 
                });

                // Éxito
                estadoMsg.style.color = "#22c55e";
                estadoMsg.innerText = "✅ ¡Reporte enviado con éxito!";
                pagoForm.reset();

            } catch (err) {
                console.error('Error en el proceso:', err);
                estadoMsg.style.color = "#dc3545";
                estadoMsg.innerText = "❌ Error al enviar. Por favor, reintente.";
            } finally {
                btnSubmit.disabled = false;
            }
        });
    });
</script>
