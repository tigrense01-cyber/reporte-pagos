<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reporte de Pago - Mi WISP</title>
    <style>
        :root {
            --color-main: #1877F2;
            --color-success: #22c55e;
            --color-error: #dc3545;
            --text-dark: #1f2937;
            --shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 22px;
            width: 92%;
            max-width: 380px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .payment-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .cashea-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cashea-row:last-child { border-bottom: none; }

        .label-cashea { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .value-cashea { font-size: 14px; font-weight: 700; color: #1e293b; }

        .btn-copy-mini {
            background: #e2e8f0;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            color: var(--color-main);
            cursor: pointer;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-left: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--color-main); }

        .campo-referencia {
            background: #f0faff;
            border-color: var(--color-main);
            font-weight: bold;
            color: var(--color-main);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: var(--color-main);
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        button[type="submit"]:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        #estado {
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Reportar Pago</h2>

    <div class="payment-card">
        <div style="font-size:10px; font-weight:800; color:var(--color-main); margin-bottom:6px; text-align:center; letter-spacing:1px;">DATOS DE PAGO MÓVIL</div>
        
        <div class="cashea-row">
            <div>
                <div class="label-cashea">Banco</div>
                <div class="value-cashea">BVC (0104)</div>
            </div>
            <button class="btn-copy-mini" onclick="copyText('0104', this)">COPIAR</button>
        </div>

        <div class="cashea-row">
            <div>
                <div class="label-cashea">Cédula</div>
                <div class="value-cashea">V-14.560.040</div>
            </div>
            <button class="btn-copy-mini" onclick="copyText('14560040', this)">COPIAR</button>
        </div>

        <div class="cashea-row">
            <div>
                <div class="label-cashea">Teléfono</div>
                <div class="value-cashea">0424-8808670</div>
            </div>
            <button class="btn-copy-mini" onclick="copyText('04248808670', this)">COPIAR</button>
        </div>
    </div>

    <form id="pagoForm" name="google-sheet">
        <label>Nombre del Cliente</label>
        <input type="text" name="Nombre" id="cliente" placeholder="Ej: Juan Pérez" required>

        <label>Teléfono de Contacto</label>
        <input type="tel" name="Telefono" id="telefono" placeholder="Ej: 04121234567" required>
        
        <label>Método de Pago</label>
        <select name="Metodo" id="metodo">
            <option value="Pago Movil">Pago Móvil</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Zelle / Divisas">Zelle / Divisas</option>
        </select>
        
        <label>Monto de la Operación</label>
        <input type="number" step="0.01" name="Monto" id="monto" placeholder="Monto enviado" required>
        
        <label>Número de Referencia</label>
        <input type="text" name="Referencia" id="referencia" class="campo-referencia" placeholder="Los últimos 6 dígitos" required>
        
        <button type="submit" id="submit-btn">ENVIAR REPORTE</button>
    </form>
    
    <p id="estado"></p>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const token = "6554753247:AAFUFA8uZgEhDXOlHCwz4Hcr2ORI-qgVBOY"; 
    const chatId = "2052943784"; 
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyIzlptby-VoHrrxQ9J49KIq790-GqpDJRXyubHwxboFh6qJFiIzi_c3IaueoA7BzmH/exec';

    // Función Copiar
    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = "¡OK!";
            btn.style.background = "#22c55e";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.background = "#e2e8f0";
                btn.style.color = "#1877F2";
            }, 1200);
        });
    }

    const form = document.getElementById('pagoForm');
    const btnSubmit = document.getElementById('submit-btn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const estado = document.getElementById('estado');
        estado.style.color = "#1877F2";
        estado.innerText = "Procesando reporte...";
        btnSubmit.disabled = true;

        const cliente = document.getElementById('cliente').value;
        const tlf = document.getElementById('telefono').value;
        const metodo = document.getElementById('metodo').value;
        const monto = document.getElementById('monto').value;
        const ref = document.getElementById('referencia').value;

        // 1. Envío a Telegram
        const mensajeTelegram = `🏦 *NUEVO REPORTE DE PAGO*%0A%0A👤 *Cliente:* ${cliente}%0A📞 *Tlf:* ${tlf}%0A💳 *Método:* ${metodo}%0A💰 *Monto:* ${monto}%0A🔢 *Ref:* ${ref}`;
        
        const promiseTelegram = fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${mensajeTelegram}&parse_mode=Markdown`);

        // 2. Envío a Google Sheets
        const promiseSheets = fetch(scriptURL, { method: 'POST', body: new FormData(form)});

        Promise.all([promiseTelegram, promiseSheets])
        .then(responses => {
            // Verificamos si Telegram respondió bien (Sheets suele devolver éxito aunque haya errores de CORS, por eso priorizamos Telegram)
            if(responses[0].ok) {
                estado.style.color = "#22c55e";
                estado.innerText = "✅ Reporte guardado y enviado con éxito.";
                form.reset();
            } else {
                throw new Error("Error en el envío");
            }
        })
        .catch(error => {
            estado.style.color = "#dc3545";
            estado.innerText = "❌ Error al procesar. Intente de nuevo.";
            console.error('Error!', error.message);
        })
        .finally(() => {
            btnSubmit.disabled = false;
        });
    });
</script>

</body>
</html>
