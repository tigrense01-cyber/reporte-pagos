<script>
    // Configuración
    const CONFIG = {
        token: "6554753247:AAFUFA8uZgEhDXOlHCwz4Hcr2ORI-qgVBOY",
        chatId: "2052943784",
        scriptURL: 'https://script.google.com/macros/s/AKfycbwmL2cspMneufDpVio6BHH5YjOkph4VwsYDLKQqTmR-3rlH7p8x9T-vjWrzG_w8heXA/exec'
    };

    // Función para copiar texto
    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "¡Listo!";
            setTimeout(() => { btn.innerText = originalText; }, 1500);
        });
    }

    // Esperar a que cargue la página
    window.onload = function() {
        const form = document.getElementById('pagoForm');
        const estado = document.getElementById('estado');
        const btn = document.getElementById('submit-btn');

        if(!form) return;

        form.onsubmit = function(e) {
            e.preventDefault();

            btn.disabled = true;
            estado.innerText = "Enviando...";
            estado.style.color = "blue";

            const formData = new FormData(form);
            
            // Datos para Telegram
            const c = document.getElementById('cliente').value;
            const t = document.getElementById('telefono').value;
            const m = document.getElementById('metodo').value;
            const v = document.getElementById('monto').value;
            const r = document.getElementById('referencia').value;

            const msg = `🏦 *NUEVO PAGO*%0A👤 ${c}%0A📞 ${t}%0A💳 ${m}%0A💰 ${v}%0A🔢 ${r}`;

            // Enviar a Telegram
            fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage?chat_id=${CONFIG.chatId}&text=${msg}&parse_mode=Markdown`)
            .then(() => {
                // Enviar a Google
                return fetch(CONFIG.scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
            })
            .then(() => {
                estado.innerText = "✅ Enviado correctamente";
                estado.style.color = "green";
                form.reset();
            })
            .catch(() => {
                estado.innerText = "❌ Error al enviar";
                estado.style.color = "red";
            })
            .finally(() => {
                btn.disabled = false;
            });
        };
    };
</script>
